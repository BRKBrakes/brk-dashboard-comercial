<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRK · Dashboard Comercial</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="login">
  <form id="loginForm">
    <img src="BRK_logo_11.png" alt="BRK Beyond Roads Known" class="logo">
    <p>Dashboard Comercial · Acceso restringido</p>
    <input type="email" id="email" placeholder="correo" required>
    <input type="password" id="password" placeholder="contraseña" required>
    <button type="submit">Entrar</button>
    <div class="err" id="loginErr"></div>
  </form>
</div>

<div id="app" class="hidden">
  <header>
    <div class="brand"><img src="BRK_logo_11.png" alt="BRK"></div>
    <div class="title">DASHBOARD COMERCIAL 2026</div>
    <div class="right">
      <img src="BRK_logo_31.png" alt="Roadrunner BRK">
      <button id="logoutBtn">Salir</button>
    </div>
  </header>
  <main>
    <div class="tabs">
      <div class="tab active" data-tab="ejecutivo">Directivo</div>
      <div class="tab" data-tab="oportunidades">Oportunidades</div>
      <div class="tab" data-tab="tipoa">Aliados Tipo A</div>
      <div class="tab" data-tab="segmentacion">Segmentación</div>
      <div class="tab" data-tab="perdidos">Recuperación</div>
      <div class="tab" data-tab="ticket">Ticket Promedio</div>
      <div class="tab" data-tab="portafolio">Portafolio</div>
      <div class="tab" data-tab="planes">Planes de acción</div>
    </div>
    <div id="sub-oportunidades" class="subtabs hidden" style="margin-top:-8px;display:flex;gap:8px;margin-bottom:20px;">
      <div class="tab active" data-subtab="gapdiscos" style="font-size:12px;">Gap Discos</div>
      <div class="tab" data-subtab="gapliquidos" style="font-size:12px;">Gap Líquidos</div>
      <div class="tab" data-subtab="gapcilindros" style="font-size:12px;">Gap Cilindros</div>
    </div>

    <div id="view-ejecutivo">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;align-items:start;">
        <div id="top-kam"></div>
        <div id="top-aliados"></div>
      </div>
      <div class="card" style="padding:12px 20px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <span style="font-size:12px;color:var(--text-dim);">Periodo:</span>
        <select id="mesDesde" class="estado"></select>
        <span style="color:var(--text-dim);font-size:12px;">a</span>
        <select id="mesHasta" class="estado"></select>
        <button id="btnFiltrar" style="width:auto;padding:6px 14px;font-size:12px;">Aplicar</button>
      </div>
      <div id="ejecutivo-contenido"></div>
    </div>
    <div id="view-oportunidades" class="hidden">
      <div id="view-gapdiscos"></div>
      <div id="view-gapliquidos" class="hidden"></div>
      <div id="view-gapcilindros" class="hidden"></div>
    </div>
    <div id="view-tipoa" class="hidden"></div>
    <div id="view-segmentacion" class="hidden"></div>
    <div id="view-perdidos" class="hidden"></div>
    <div id="view-ticket" class="hidden"></div>
    <div id="view-portafolio" class="hidden"></div>
    <div id="view-planes" class="hidden"></div>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
