<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRK · Dashboard Comercial</title>
<style>
  :root{
    --neon:#F1FE34; --dust:#596B63; --forest:#414930; --ash:#363636; --silver:#9A979F;
    --bg:#1c1f1b; --card:#242820; --text:#f1f1ec; --text-dim:#b9b9b0;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Geist Mono',monospace;background:var(--bg);color:var(--text);}
  .hidden{display:none !important;}

  /* Login */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;}
  #login form{background:var(--card);padding:2.5rem;border-radius:12px;width:320px;border:1px solid var(--dust);}
  #login h1{color:var(--neon);font-size:20px;letter-spacing:2px;margin:0 0 4px;text-align:center;}
  #login p{color:var(--text-dim);font-size:12px;text-align:center;margin:0 0 24px;}
  input{width:100%;padding:10px;margin-bottom:12px;border-radius:6px;border:1px solid var(--dust);background:#2c3126;color:var(--text);font-family:inherit;}
  button{width:100%;padding:10px;border-radius:6px;border:none;background:var(--neon);color:var(--ash);font-weight:700;cursor:pointer;font-family:inherit;}
  button:hover{opacity:0.85;}
  .err{color:#ff6b6b;font-size:12px;margin-top:8px;text-align:center;min-height:16px;}

  /* App shell */
  header{background:var(--ash);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--neon);}
  header .brand{color:var(--neon);font-weight:700;letter-spacing:2px;font-size:18px;}
  header .brand span{color:var(--silver);font-weight:400;font-size:12px;margin-left:8px;}
  header button{width:auto;padding:8px 16px;background:transparent;color:var(--silver);border:1px solid var(--dust);}

  main{padding:24px;max-width:1200px;margin:0 auto;}
  .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .tab{padding:8px 16px;border-radius:6px;background:var(--card);color:var(--text-dim);cursor:pointer;font-size:13px;border:1px solid var(--dust);}
  .tab.active{background:var(--forest);color:var(--neon);border-color:var(--neon);}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px;}
  .kpi{background:var(--card);border-radius:10px;padding:16px;border:1px solid var(--dust);}
  .kpi .label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;}
  .kpi .value{font-size:24px;color:var(--neon);font-weight:700;margin-top:6px;}

  .card{background:var(--card);border-radius:10px;padding:20px;margin-bottom:16px;border:1px solid var(--dust);}
  .card h2{margin:0 0 16px;font-size:14px;color:var(--silver);text-transform:uppercase;letter-spacing:1px;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--text-dim);font-weight:400;padding:8px;border-bottom:1px solid var(--dust);font-size:11px;text-transform:uppercase;}
  td{padding:8px;border-bottom:1px solid #333630;}
  tr:hover td{background:#2a2e24;}
  .num{text-align:right;font-variant-numeric:tabular-nums;}

  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .bar-label{width:180px;font-size:12px;color:var(--text-dim);flex-shrink:0;}
  .bar-track{flex:1;height:8px;background:#333630;border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--neon);}
  .bar-pct{width:50px;text-align:right;font-size:12px;color:var(--neon);}

  select.estado{background:#2c3126;color:var(--text);border:1px solid var(--dust);border-radius:4px;padding:4px 6px;font-family:inherit;font-size:12px;}
  .loading{color:var(--text-dim);font-size:13px;padding:20px;text-align:center;}
  .money{font-variant-numeric:tabular-nums;}
</style>
</head>
<body>

<div id="login">
  <form id="loginForm">
    <h1>BRK</h1>
    <p>Dashboard Comercial · Acceso restringido</p>
    <input type="email" id="email" placeholder="correo" required>
    <input type="password" id="password" placeholder="contraseña" required>
    <button type="submit">Entrar</button>
    <div class="err" id="loginErr"></div>
  </form>
</div>

<div id="app" class="hidden">
  <header>
    <div class="brand">BRK <span>DASHBOARD COMERCIAL 2026</span></div>
    <button id="logoutBtn">Salir</button>
  </header>
  <main>
    <div class="tabs">
      <div class="tab active" data-tab="ejecutivo">Ejecutivo</div>
      <div class="tab" data-tab="gapdiscos">Gap Discos</div>
      <div class="tab" data-tab="perdidos">Recuperación</div>
      <div class="tab" data-tab="planes">Planes de acción</div>
    </div>

    <div id="view-ejecutivo"></div>
    <div id="view-gapdiscos" class="hidden"></div>
    <div id="view-perdidos" class="hidden"></div>
    <div id="view-planes" class="hidden"></div>
  </main>
</div>

<script>
const SUPABASE_URL = 'https://ytgziytuldsqhymqjyig.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0Z3ppeXR1bGRzcWh5bXFqeWlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjA4ODAsImV4cCI6MjA5Nzc5Njg4MH0.z4KapPX5bGEXRmS-Ntky0XmYZz45s5j1DpBuPgE_PIU';

let TOKEN = localStorage.getItem('brk_token') || null;

async function rpc(fn, params = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
    },
    body: JSON.stringify(params)
  });
  return res.json();
}

const money = n => '$' + Math.round(n||0).toLocaleString('es-CO');

// ---- LOGIN ----
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  const r = await rpc('dash_login', { p_email: email, p_password: password });
  if (r.ok) {
    TOKEN = r.token;
    localStorage.setItem('brk_token', TOKEN);
    showApp();
  } else {
    errEl.textContent = r.error || 'Error al iniciar sesión';
  }
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('brk_token');
  TOKEN = null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login').classList.remove('hidden');
});

// ---- TABS ----
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('main > div[id^="view-"]').forEach(v => v.classList.add('hidden'));
    const view = document.getElementById('view-' + tab.dataset.tab);
    view.classList.remove('hidden');
    loadTab(tab.dataset.tab);
  });
});

async function showApp() {
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  loadTab('ejecutivo');
}

const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

async function loadTab(tab) {
  if (tab === 'ejecutivo') return loadEjecutivo();
  if (tab === 'gapdiscos') return loadGapDiscos();
  if (tab === 'perdidos') return loadPerdidos();
  if (tab === 'planes') return loadPlanes();
}

async function loadEjecutivo() {
  const el = document.getElementById('view-ejecutivo');
  el.innerHTML = '<div class="loading">Cargando KPI...</div>';
  const [kpi, kams] = await Promise.all([
    rpc('dash_kpi_ejecutivo', { p_token: TOKEN }),
    rpc('dash_cumplimiento_kam', { p_token: TOKEN })
  ]);
  if (!kpi.ok) { el.innerHTML = '<div class="loading">Sesión expirada, vuelve a entrar.</div>'; return; }

  const totalReal = kpi.total_real_ytd || 0;
  const totalPpto = kpi.total_anual_presupuesto || 0;
  const cumplPct = totalPpto ? Math.round((totalReal/totalPpto)*100) : 0;

  let html = `<div class="kpis">
    <div class="kpi"><div class="label">Venta acumulada 2026</div><div class="value">${money(totalReal)}</div></div>
    <div class="kpi"><div class="label">Presupuesto anual AFL</div><div class="value">${money(totalPpto)}</div></div>
    <div class="kpi"><div class="label">Cumplimiento</div><div class="value">${cumplPct}%</div></div>
  </div>`;

  html += '<div class="card"><h2>Venta real vs presupuesto por mes</h2><table><tr><th>Mes</th><th class="num">Real</th><th class="num">Presupuesto</th><th class="num">%</th></tr>';
  (kpi.por_mes || []).forEach(m => {
    const pct = m.presupuesto ? Math.round((m.venta_real/m.presupuesto)*100) : 0;
    html += `<tr><td>${MESES[m.mes-1]}</td><td class="num money">${money(m.venta_real)}</td><td class="num money">${money(m.presupuesto)}</td><td class="num">${pct}%</td></tr>`;
  });
  html += '</table></div>';

  html += '<div class="card"><h2>Cumplimiento por KAM</h2>';
  (kams.data || []).forEach(k => {
    const pct = k.presupuesto_anual ? Math.min(100, Math.round((k.venta_real/k.presupuesto_anual)*100)) : 0;
    html += `<div class="bar-row"><div class="bar-label">${titleCase(k.vendedor)}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><div class="bar-pct">${pct}%</div></div>`;
  });
  html += '</div>';

  el.innerHTML = html;
}

async function loadGapDiscos() {
  const el = document.getElementById('view-gapdiscos');
  el.innerHTML = '<div class="loading">Cargando gap de discos...</div>';
  const r = await rpc('dash_gap_discos', { p_token: TOKEN });
  if (!r.ok) { el.innerHTML = '<div class="loading">Sesión expirada.</div>'; return; }
  let html = '<div class="card"><h2>Clientes con gap de discos (últimos 90 días)</h2><table><tr><th>Cliente</th><th>Vendedor</th><th>Ciudad</th><th class="num">Pastas</th><th class="num">Discos</th><th class="num">Ratio</th></tr>';
  (r.data || []).forEach(c => {
    html += `<tr><td>${c.cliente}</td><td>${titleCase(c.vendedor)}</td><td>${c.ciudad||''}</td><td class="num money">${money(c.pastas)}</td><td class="num money">${money(c.discos)}</td><td class="num">${Math.round((c.ratio_discos_pastas||0)*100)}%</td></tr>`;
  });
  html += '</table></div>';
  el.innerHTML = html;
}

async function loadPerdidos() {
  const el = document.getElementById('view-perdidos');
  el.innerHTML = '<div class="loading">Cargando clientes por recuperar...</div>';
  const r = await rpc('dash_clientes_perdidos', { p_token: TOKEN });
  if (!r.ok) { el.innerHTML = '<div class="loading">Sesión expirada.</div>'; return; }
  let html = '<div class="card"><h2>Clientes con venta 2025 sin compras en 2026</h2><table><tr><th>Cliente</th><th>Vendedor</th><th class="num">Venta 2025</th><th>Última compra</th></tr>';
  (r.data || []).forEach(c => {
    html += `<tr><td>${c.cliente}</td><td>${titleCase(c.vendedor||'')}</td><td class="num money">${money(c.venta_2025)}</td><td>${c.ultima_compra||''}</td></tr>`;
  });
  html += '</table></div>';
  el.innerHTML = html;
}

async function loadPlanes() {
  const el = document.getElementById('view-planes');
  el.innerHTML = '<div class="loading">Cargando planes de acción...</div>';
  const r = await rpc('dash_planes_listar', { p_token: TOKEN, p_tipo_plan: null });
  if (!r.ok) { el.innerHTML = '<div class="loading">Sesión expirada.</div>'; return; }
  let html = '<div class="card"><h2>Planes de acción</h2>';
  if (!r.data || r.data.length === 0) {
    html += '<p style="color:var(--text-dim);font-size:13px;">Aún no hay planes cargados. Se poblarán con las listas de Gap Discos y Recuperación priorizadas.</p>';
  } else {
    html += '<table><tr><th>Cliente</th><th>Tipo</th><th>Vendedor</th><th class="num">Potencial/mes</th><th>Estado</th></tr>';
    r.data.forEach(p => {
      html += `<tr><td>${p.cliente}</td><td>${p.tipo_plan}</td><td>${titleCase(p.vendedor||'')}</td><td class="num money">${money(p.potencial_mes)}</td><td>
        <select class="estado" data-id="${p.id}">
          <option value="pendiente" ${p.estado==='pendiente'?'selected':''}>Pendiente</option>
          <option value="gestionado" ${p.estado==='gestionado'?'selected':''}>Gestionado</option>
          <option value="ganado" ${p.estado==='ganado'?'selected':''}>Ganado</option>
          <option value="descartado" ${p.estado==='descartado'?'selected':''}>Descartado</option>
        </select>
      </td></tr>`;
    });
    html += '</table>';
  }
  html += '</div>';
  el.innerHTML = html;

  el.querySelectorAll('.estado').forEach(sel => {
    sel.addEventListener('change', async () => {
      await rpc('dash_planes_actualizar_estado', { p_token: TOKEN, p_id: parseInt(sel.dataset.id), p_estado: sel.value });
    });
  });
}

function titleCase(s) {
  return (s||'').toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

// Auto-login si hay token guardado
if (TOKEN) { showApp(); }
</script>
</body>
</html>
